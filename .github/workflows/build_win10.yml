name: Build Indras-Mirror llama.cpp (RTX 4070 Ti Super)
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: Jimver/cuda-toolkit@v0.2.14
        id: cuda-toolkit
        with: { cuda: '12.4.1' }
      - run: |
          mkdir build && cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=89 -DLLAMA_CURL=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j 4
      - run: |
          mkdir release_package
          copy build\bin\Release\*.exe release_package\
          copy build\bin\Release\*.dll release_package\
          $cuda_bin = "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}\bin"
          copy "$cuda_bin\cudart64_12.dll" release_package\
          copy "$cuda_bin\cublas64_12.dll" release_package\
          copy "$cuda_bin\cublasLt64_12.dll" release_package\
      - uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-Indras-MTP-TQ3
          path: release_package\*
